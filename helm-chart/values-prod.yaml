# ════════════════════════════════════════════════════════════════
# Production Environment Overrides
# ════════════════════════════════════════════════════════════════

replicaCount: 3

env:
  APP_NAME: "orderly-app"
  APP_VERSION: "0.2.0"
  ENVIRONMENT: "production"

ingress:
  enabled: true
  className: nginx
  host: orderly-app.prod.local
  annotations:
    nginx.ingress.kubernetes.io/rate-limiting: "on"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70