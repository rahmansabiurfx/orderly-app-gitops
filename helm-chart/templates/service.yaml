# ════════════════════════════════════════════════════════════════
# Service — Stable network endpoint for the application
# ════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: {{ include "orderly-app.fullname" . }}
  labels:
    {{- include "orderly-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "orderly-app.selectorLabels" . | nindent 4 }}

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}