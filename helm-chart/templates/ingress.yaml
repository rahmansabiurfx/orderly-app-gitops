# ════════════════════════════════════════════════════════════════
# Ingress — HTTP routing from outside the cluster to the Service
# ════════════════════════════════════════════════════════════════
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "orderly-app.fullname" . }}
  labels:
    {{- include "orderly-app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "orderly-app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}