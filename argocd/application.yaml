# ════════════════════════════════════════════════════════════════
# ArgoCD Application — orderly-app (dev environment)
# ════════════════════════════════════════════════════════════════

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orderly-app-dev
  namespace: argocd

  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  # ── Project ──
  project: default

  # ── Source: Desired state location ──
  source:
    repoURL: https://github.com/rahmansabiurfx/orderly-app-gitops.git
    targetRevision: main

    # Helm chart path
    path: helm-chart

    # Helm-specific configuration
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  # ── Destination ──
  destination:
    server: https://kubernetes.default.svc

    # Namespace to deploy the resources into
    namespace: default

  # ── Sync Policy ──
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m